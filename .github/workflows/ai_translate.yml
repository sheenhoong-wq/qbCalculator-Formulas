name: AI Formula Translate
on:
  push:
    paths:
      - 'formulas/**.json'
  workflow_dispatch: # 👈 这一行允许你在 GitHub 页面手动点击 "Run workflow"

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，确保代码是最新的

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      - name: Run Translation Script
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python scripts/translate.py

      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI: Batch translation update (GPT-4o)"
          file_pattern: 'formulas/*.json'
