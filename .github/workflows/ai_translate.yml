name: AI Formula Translate

on:
  # 关键修复：当“Sync Formulas from Firestore”工作流运行完成时，立即启动此工作流
  workflow_run:
    workflows: ["Sync Formulas from Firestore"]
    types:
      - completed

  # 保留：当 formulas 文件夹下的文件直接被 push 时（例如作者手动修改）触发
  push:
    paths:
      - 'formulas/**.json'
  
  # 保留：允许在 GitHub 网页手动点按钮运行
  workflow_dispatch: 

jobs:
  translate:
    runs-on: ubuntu-latest
    # 逻辑：只有当同步工作流是“成功”结束，或者是手动/推送触发时，才执行翻译
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install openai

      - name: Run Translation Script
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python scripts/translate.py

      - name: Auto Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI: Batch translation and audit update (GPT-4o)"
          file_pattern: 'formulas/*.json'
