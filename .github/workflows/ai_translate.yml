name: AI Formula Translate
on:
  # 方案 A: 监听同步工作流的结束（推荐，最稳定）
  workflow_run:
    workflows: ["Sync Firestore Formulas"] # 👈 这里填你那个“同步工作流”的真实名称 (name)
    types:
      - completed

  # 方案 B: 保留手动触发和推送触发
  push:
    paths:
      - 'formulas/**.json'
  workflow_dispatch: 

jobs:
  translate:
    runs-on: ubuntu-latest
    # 只有当同步工作流是“成功”结束时才运行翻译（针对方案 A）
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install openai

      - name: Run Translation Script
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python scripts/translate.py

      - name: Auto Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI: Batch translation update (GPT-4o)"
          file_pattern: 'formulas/*.json'
