name: Sync Formulas from Firestore

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # 必须有这一行，否则 git push 会失败
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # 这里不需要 with: node-version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 这一行必须在这里

      - name: Install Dependencies
        run: npm install firebase-admin

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node sync_script_automated.js

      - name: Commit and Push
        run: |
          git config --global user.name "Marketplace Bot"
          git config --global user.email "bot@qbcalculator.com"
          git add .
          git commit -m "Auto-sync new formulas" || exit 0
          git push
