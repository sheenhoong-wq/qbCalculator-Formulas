# .github/workflows/sync_formulas.yml
name: Sync Formulas from Firestore

on:
  schedule:
    - cron: '0 * * * *' # 每小时运行一次
  workflow_dispatch: # 允许在 Actions 页面手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    # 必须添加下面这两行，赋予 Action 修改仓库的权限
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

        with:
          node-version: '20' # 升级到 Node 20

      - name: Install Dependencies
        run: npm install firebase-admin

      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # 此脚本目前的逻辑：
          # 1. 连接到 Firestore 的 'formulas' 集合（因为 App 现在直接往这里写完整数据）
          # 2. 过滤 status == 'active' 
          # 3. 将数据写入 formulas/*.json
          # 4. 更新 index.json
          # 5. 提交并推送回此仓库
          node sync_script_autoamted.js

      - name: Commit and Push
        run: |
          git config --global user.name "Marketplace Bot"
          git config --global user.email "bot@qbcalculator.com"
          git add .
          git commit -m "Auto-sync new formulas from community" || exit 0
          git push
