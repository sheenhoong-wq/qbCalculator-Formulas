name: Sync Formulas from Firestore

on:
  schedule:
    - cron: '0 * * * *' # 依然保留每小时运行一次作为兜底
  workflow_dispatch: # 允许你在 GitHub 网页上点按钮手动触发
  repository_dispatch: # <--- 关键新增：允许 Firebase 远程通过 API 触发
    types: [firestore_update] # 这个名字必须和云函数代码里的 event_type 一致

jobs:
  sync:
    runs-on: ubuntu-latest
    
    # 必须开启写入权限，否则最后的 git push 会失败
    permissions:
      contents: write
    
    steps:
      # 步骤 1: 拉取代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 步骤 2: 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 步骤 3: 安装 Firebase 管理员 SDK
      - name: Install Dependencies
        run: npm install firebase-admin

      # 步骤 4: 执行同步脚本
      - name: Run Sync Script
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node sync_script_automated.js

      # 步骤 5: 提交更改并推送到仓库
      - name: Commit and Push
        run: |
          git config --global user.name "Marketplace Bot"
          git config --global user.email "bot@qbcalculator.com"
          git add .
          # 如果没有文件变化，使用 || exit 0 确保任务不报错
          git commit -m "Auto-sync from Firestore (Triggered by Firebase)" || exit 0
          git push
